<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhiShAI | Analysis Result</title>
  <style>
    :root {
      --phish-red: #ff4b2b;
      --safe-green: #00b09b;
      --accent-blue: #00c6ff;
    }
    body { 
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff; font-family: 'Poppins', 'Segoe UI', sans-serif; 
      margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
    }
    .container { 
      background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); 
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; 
      padding: 40px; text-align: center; max-width: 500px; width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    }
    .icon-box { font-size: 4.5rem; margin-bottom: 15px; }
    h1 { font-weight: 300; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.7; text-transform: uppercase; }
    
    .verdict { font-size: 1.8rem; font-weight: 800; margin-bottom: 25px; text-transform: uppercase; line-height: 1.2; }
    .phishing { color: var(--phish-red); text-shadow: 0 0 20px rgba(255, 75, 43, 0.3); }
    .safe { color: var(--safe-green); text-shadow: 0 0 20px rgba(0, 176, 155, 0.3); }

    /* Confidence Bar */
    .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .progress-container { background: rgba(255,255,255,0.1); border-radius: 20px; height: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { 
      height: 100%; border-radius: 20px; transition: width 1s ease-in-out; 
      background: {% if 'Phishing' in result %} linear-gradient(90deg, #ff416c, #ff4b2b) {% else %} linear-gradient(90deg, #1D976C, #93F9B9) {% endif %};
    }

    /* Stats Card */
    .card { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .stat-row:last-child { margin-bottom: 0; border-bottom: none; }
    .stat-label { color: rgba(255,255,255,0.6); font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
    .stat-value { font-weight: 600; font-size: 0.95rem; }

    .btn { 
      display: inline-block; margin-top: 35px; padding: 12px 35px; 
      background: linear-gradient(135deg, #00c6ff, #0072ff); color: #fff; 
      text-decoration: none; border-radius: 50px; font-weight: 600; transition: 0.3s;
      box-shadow: 0 8px 15px rgba(0, 114, 255, 0.2);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(0, 114, 255, 0.3); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Analysis Report</h1>
    
    <div class="icon-box">
      {% if 'Phishing' in result %} ⚠️ {% else %} 🛡️ {% endif %}
    </div>

    <div class="verdict {{ status_class }}">
      {{ result }}
    </div>

    <div class="label">AI Confidence</div>
    <div class="progress-container">
      <div class="progress-bar" style="width: {{ bert_score }}"></div>
    </div>

    <div class="card">
      <div class="stat-row">
        <span class="stat-label">🤖 Prediction Score</span>
        <span class="stat-value">{{ bert_score }}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">🔍 Metadata Flags</span>
        <span class="stat-value">{{ heuristic_score }} Signals</span>
      </div>
      
    <a href="/" class="btn">Scan New Message</a>
  </div>
</body>
</html>
